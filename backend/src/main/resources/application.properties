spring.application.name=backend
server.port=8080

# DataSource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jobtrackr}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}

# JPA — ddl-auto=none : Flyway est le seul responsable du schéma.
# Passer à "validate" uniquement après la conversion complète des records en @Entity.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
